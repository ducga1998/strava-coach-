name: Deploy Backend to Railway

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'scripts/deploy-backend-railway.sh'
      - '.github/workflows/deploy-backend-railway.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-railway
  cancel-in-progress: true

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate backend deploy secrets
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
        run: |
          test -n "$RAILWAY_TOKEN" || (echo "Missing RAILWAY_TOKEN" && exit 1)
          test -n "$RAILWAY_PROJECT_ID" || (echo "Missing RAILWAY_PROJECT_ID" && exit 1)
          test -n "$RAILWAY_ENVIRONMENT" || (echo "Missing RAILWAY_ENVIRONMENT" && exit 1)
          test -n "$RAILWAY_SERVICE" || (echo "Missing RAILWAY_SERVICE" && exit 1)

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Test backend smoke
        working-directory: backend
        run: python -m pytest -q tests/test_main.py

      - name: Setup Node for Railway CLI
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy backend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
        run: |
          npx -y @railway/cli up \
            --ci \
            --service "$RAILWAY_SERVICE" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --project "$RAILWAY_PROJECT_ID" \
            backend \
            --path-as-root
