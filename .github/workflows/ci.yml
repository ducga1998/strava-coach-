name: CI

on: [push, pull_request]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/postgres
      REDIS_URL: redis://localhost:6379/0
      # CI-only key — freshly generated with os.urandom(32). NOT a prod secret.
      ENCRYPTION_KEY: ozEksEKk3bXXedGR86j+sspuaimwdytWTWBa9aNvX4g=
      STRAVA_CLIENT_ID: "0"
      STRAVA_CLIENT_SECRET: "x"
      STRAVA_VERIFY_TOKEN: "x"
      STRAVA_WEBHOOK_CALLBACK_URL: "http://localhost"
      STRAVA_AUTH_CALLBACK_URL: "http://localhost/auth/callback"
      ANTHROPIC_API_KEY: "sk-ant-test"
      JWT_SECRET: "x"
      FRONTEND_URL: "http://localhost:5173"
      ENABLE_LLM_DEBRIEFS: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - name: Install backend deps
        run: pip install -r backend/requirements.txt
      - name: Run Alembic migrations
        working-directory: backend
        run: alembic upgrade head
      - name: Run pytest
        working-directory: backend
        run: pytest tests/ -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci --prefix frontend
      - name: Typecheck
        run: npm run typecheck --prefix frontend
      - name: Build
        run: npm run build --prefix frontend
